<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5ecda;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ead8bd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9f2ea;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="800" fill="url(#heroGrad)"/>

  <!-- Radar circles (top right) -->
  <g opacity="0.15" stroke="#9b5834" stroke-width="2" fill="none">
    <circle cx="1650" cy="150" r="80" stroke-dasharray="3,4"/>
    <circle cx="1650" cy="150" r="140" stroke-dasharray="4,5"/>
    <circle cx="1650" cy="150" r="200" stroke-dasharray="5,6"/>
  </g>

  <!-- Wave patterns (left side) -->
  <g opacity="0.12" stroke="#0d4746" stroke-width="2.5" fill="none">
    <path d="M 50 300 Q 150 280, 250 300 T 450 300" stroke-linecap="round"/>
    <path d="M 50 350 Q 150 330, 250 350 T 450 350" stroke-linecap="round"/>
    <path d="M 50 400 Q 150 380, 250 400 T 450 400" stroke-linecap="round"/>
  </g>

  <!-- Scattered dots (hand-drawn style) -->
  <g fill="#87b6a2" opacity="0.2">
    <circle cx="300" cy="150" r="3"/>
    <circle cx="450" cy="180" r="2.5"/>
    <circle cx="600" cy="140" r="3.5"/>
    <circle cx="800" cy="600" r="3"/>
    <circle cx="950" cy="650" r="2.5"/>
    <circle cx="1100" cy="620" r="3"/>
    <circle cx="1400" cy="500" r="2.5"/>
    <circle cx="1550" cy="550" r="3.5"/>
  </g>

  <!-- Signal lines (bottom right) -->
  <g opacity="0.1" stroke="#c9893f" stroke-width="1.5" fill="none">
    <line x1="1200" y1="700" x2="1800" y2="700" stroke-dasharray="2,3"/>
    <line x1="1200" y1="730" x2="1800" y2="730" stroke-dasharray="2,3"/>
    <line x1="1200" y1="760" x2="1800" y2="760" stroke-dasharray="2,3"/>
  </g>
</svg>
